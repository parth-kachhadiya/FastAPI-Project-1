services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-price-predictor
    ports:
      - "8000:8000"
    environment:
      - API_KEY=admin
      - JWT_SECRET_KEY=jwt_B7CH0ZP9Iypm99T5KSxwu6626i8k3pIE
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - backend

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: car-price-ui
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000    # ← talks to api service internally
      - API_KEY=admin
    depends_on:
      - api
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis1
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana1
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  backend:
    driver: bridge